name: Biweekly Security Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout aggregator repo
        uses: actions/checkout@v4

      - name: Clone Balkan repo
        run: git clone https://github.com/mikloshetzer-sketch/balkan-security-map.git

      - name: Clone CEE repo
        run: git clone https://github.com/mikloshetzer-sketch/cee-security-map.git

      - name: Clone Middle East repo
        run: git clone https://github.com/mikloshetzer-sketch/me-security-monitor.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run report script
        run: python scripts/build_report.py

      - name: Commit report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add report.md
          git commit -m "auto: update security report" || echo "no changes"
          git push
