name: Post report.md to WordPress

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1,15 * *"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests markdown

      - name: Run WordPress post script
        env:
          WPCOM_ACCESS_TOKEN: ${{ secrets.WPCOM_ACCESS_TOKEN }}
          WPCOM_SITE: ${{ secrets.WPCOM_SITE }}
        run: python scripts/post_to_wordpress.py
